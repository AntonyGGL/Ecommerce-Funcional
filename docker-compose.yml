services:

  # ── Base de datos PostgreSQL ──────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: impofer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: impofer_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - impofer-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d impofer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Aplicación Spring Boot ────────────────────────────────
  app:
    build: .
    container_name: impofer-app
    restart: unless-stopped
    # NO exponemos el puerto directamente al host; Nginx hace el proxy
    expose:
      - "8080"
      - "8081"
    environment:
      DB_URL: jdbc:postgresql://db:5432/impofer_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-14400000}
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      APP_BASE_URL: ${APP_BASE_URL}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - impofer-net

  # ── Nginx (reverse proxy + SSL) ───────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: impofer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - impofer-net

  # ── Certbot (renovación automática de SSL) ────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: impofer-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:

networks:
  impofer-net:
    driver: bridge
