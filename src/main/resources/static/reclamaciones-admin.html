<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclamaciones | Impofer Admin</title>
    <link rel="icon" type="image/png" href="/Impofer.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#0f172a',
                            dark: '#1e293b',
                            card: '#1e293b',
                            accent: '#f97316'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-black text-white antialiased font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-brand-dark border-r border-white/5 hidden md:flex flex-col">
        <div class="h-20 flex items-center px-6 border-b border-white/5 font-bold text-brand-accent tracking-tighter text-xl">
            IMPOFER <span class="text-white ml-2 text-xs font-normal border border-white/20 px-1 rounded">ADMIN</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-lg transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="orders-admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-lg transition-colors">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i> Pedidos
            </a>
            <a href="clients-admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-lg transition-colors">
                <i data-lucide="users" class="w-5 h-5"></i> Clientes
            </a>
            <a href="inventory-admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-lg transition-colors">
                <i data-lucide="package" class="w-5 h-5"></i> Productos
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-brand-accent/10 text-brand-accent rounded-lg transition-colors font-bold">
                <i data-lucide="book-open" class="w-5 h-5"></i> Reclamaciones
            </a>
            <a href="cotizaciones-admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-lg transition-colors">
                <i data-lucide="file-text" class="w-5 h-5"></i> Cotizaciones
            </a>
            <div class="pt-8 space-y-2">
                <button onclick="logout()" class="flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-400/10 w-full rounded-lg transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Cerrar Sesión
                </button>
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-lg transition-colors border border-white/5 mx-0">
                    <i data-lucide="external-link" class="w-5 h-5"></i> Ir a la tienda
                </a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 bg-brand-black/90 border-b border-white/5 flex justify-between items-center px-8">
            <h1 class="text-xl font-bold">Libro de Reclamaciones</h1>
            <span class="text-xs text-slate-500 font-bold uppercase" id="rec-count">-- Reclamaciones</span>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-brand-black">
            <div class="bg-brand-card rounded-xl border border-white/5 overflow-hidden shadow-2xl">
                <div class="p-4 border-b border-white/5 flex flex-wrap gap-4 bg-white/5 items-center">
                    <div class="flex-1 min-w-[260px] relative">
                        <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-500"></i>
                        <input type="text" id="searchInput" oninput="filterTable()" placeholder="Buscar por nombre, correo o descripción..."
                            class="bg-brand-black border border-white/10 rounded-lg pl-10 pr-4 py-2 text-sm w-full focus:border-brand-accent outline-none">
                    </div>
                    <select id="filterEstado" onchange="filterTable()"
                        class="bg-brand-black border border-white/10 rounded-lg px-3 py-2 text-sm focus:border-brand-accent outline-none">
                        <option value="">Todos</option>
                        <option value="PENDIENTE">Pendientes</option>
                        <option value="PROCESADA">Procesadas</option>
                    </select>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-white/5 text-slate-500 text-xs uppercase font-bold">
                                <th class="text-left p-4">ID</th>
                                <th class="text-left p-4">Fecha</th>
                                <th class="text-left p-4">Cliente</th>
                                <th class="text-left p-4">Tipo</th>
                                <th class="text-left p-4">Descripción</th>
                                <th class="text-left p-4">Estado</th>
                                <th class="text-left p-4">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body">
                            <tr>
                                <td colspan="7" class="p-8 text-center text-slate-500">Cargando reclamaciones...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal detalle -->
    <div id="modal-detalle" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
        <div class="bg-brand-dark border border-white/10 rounded-2xl w-full max-w-xl p-6 space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-lg">Detalle de Reclamación</h2>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="modal-contenido" class="text-sm space-y-3 text-slate-300"></div>
            <div class="flex justify-end gap-3 pt-2">
                <button onclick="cerrarModal()" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 text-sm transition">Cerrar</button>
                <button id="btn-procesar" onclick="procesarReclamacion()" class="hidden px-4 py-2 rounded-lg bg-brand-accent hover:bg-orange-600 text-white text-sm font-bold transition">Marcar como procesada</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function checkAdmin() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            if (!token || role !== 'ADMIN') {
                window.location.href = 'login.html';
            }
        }
        checkAdmin();

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        let allReclamaciones = [];
        let reclamacionActual = null;

        async function loadReclamaciones() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/reclamaciones', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Error al cargar');
                allReclamaciones = await res.json();
                renderTabla(allReclamaciones);
            } catch (e) {
                document.getElementById('tabla-body').innerHTML =
                    '<tr><td colspan="7" class="p-8 text-center text-red-400">Error al cargar reclamaciones: ' + e.message + '</td></tr>';
            }
        }

        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const estado = document.getElementById('filterEstado').value;
            const filtradas = allReclamaciones.filter(r => {
                const matchText = !q ||
                    (r.nombreConsumidor || '').toLowerCase().includes(q) ||
                    (r.correo || '').toLowerCase().includes(q) ||
                    (r.descripcion || '').toLowerCase().includes(q);
                const matchEstado = !estado || r.estado === estado;
                return matchText && matchEstado;
            });
            renderTabla(filtradas);
        }

        function renderTabla(lista) {
            document.getElementById('rec-count').textContent = lista.length + ' Reclamaciones';
            if (!lista.length) {
                document.getElementById('tabla-body').innerHTML =
                    '<tr><td colspan="7" class="p-8 text-center text-slate-500">No hay reclamaciones</td></tr>';
                return;
            }
            document.getElementById('tabla-body').innerHTML = lista.map(r => {
                const fecha = r.createdAt ? new Date(r.createdAt).toLocaleDateString('es-PE') : '-';
                const estadoBadge = r.estado === 'PROCESADA'
                    ? '<span class="px-2 py-0.5 rounded-full bg-green-500/10 text-green-400 text-xs font-bold">PROCESADA</span>'
                    : '<span class="px-2 py-0.5 rounded-full bg-yellow-500/10 text-yellow-400 text-xs font-bold">PENDIENTE</span>';
                const desc = (r.descripcion || '').length > 60 ? r.descripcion.substring(0, 60) + '...' : (r.descripcion || '-');
                return `<tr class="border-b border-white/5 hover:bg-white/2 transition cursor-pointer" onclick="verDetalle(${r.id})">
                    <td class="p-4 text-brand-accent font-bold">#REC-${r.id}</td>
                    <td class="p-4 text-slate-400">${fecha}</td>
                    <td class="p-4">
                        <div class="font-semibold">${esc(r.nombreConsumidor || '-')}</div>
                        <div class="text-slate-500 text-xs">${esc(r.correo || '')}</div>
                    </td>
                    <td class="p-4 text-slate-300">${esc(r.tipo || '-')}</td>
                    <td class="p-4 text-slate-400">${esc(desc)}</td>
                    <td class="p-4">${estadoBadge}</td>
                    <td class="p-4">
                        <button onclick="event.stopPropagation(); verDetalle(${r.id})" class="text-xs px-3 py-1 rounded-lg bg-white/5 hover:bg-white/10 transition">Ver</button>
                    </td>
                </tr>`;
            }).join('');
            lucide.createIcons();
        }

        function esc(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function verDetalle(id) {
            const r = allReclamaciones.find(x => x.id === id);
            if (!r) return;
            reclamacionActual = r;
            const fecha = r.createdAt ? new Date(r.createdAt).toLocaleString('es-PE') : '-';
            document.getElementById('modal-contenido').innerHTML = `
                <div class="grid grid-cols-2 gap-3">
                    <div><span class="text-slate-500 block text-xs mb-1">Código</span><span class="font-bold text-brand-accent">#REC-${r.id}</span></div>
                    <div><span class="text-slate-500 block text-xs mb-1">Fecha</span>${esc(fecha)}</div>
                    <div><span class="text-slate-500 block text-xs mb-1">Nombre</span>${esc(r.nombreConsumidor || '-')}</div>
                    <div><span class="text-slate-500 block text-xs mb-1">Correo</span>${esc(r.correo || '-')}</div>
                    <div><span class="text-slate-500 block text-xs mb-1">Teléfono</span>${esc(r.telefono || '-')}</div>
                    <div><span class="text-slate-500 block text-xs mb-1">Tipo de Reclamo</span>${esc(r.tipo || '-')}</div>
                </div>
                <div><span class="text-slate-500 block text-xs mb-1">Bien/Servicio reclamado</span>${esc(r.bienContratado || '-')}</div>
                <div><span class="text-slate-500 block text-xs mb-1">Descripción</span><p class="text-white leading-relaxed">${esc(r.descripcion || '-')}</p></div>
                <div><span class="text-slate-500 block text-xs mb-1">Pedido</span>${esc(r.pedido || 'No especificado')}</div>
                <div><span class="text-slate-500 block text-xs mb-1">Estado</span>${r.estado === 'PROCESADA'
                    ? '<span class="px-2 py-0.5 rounded-full bg-green-500/10 text-green-400 text-xs font-bold">PROCESADA</span>'
                    : '<span class="px-2 py-0.5 rounded-full bg-yellow-500/10 text-yellow-400 text-xs font-bold">PENDIENTE</span>'}</div>
            `;
            const btnProcesar = document.getElementById('btn-procesar');
            if (r.estado !== 'PROCESADA') {
                btnProcesar.classList.remove('hidden');
            } else {
                btnProcesar.classList.add('hidden');
            }
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modal-detalle').classList.add('hidden');
            reclamacionActual = null;
        }

        async function procesarReclamacion() {
            if (!reclamacionActual) return;
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/reclamaciones/' + reclamacionActual.id + '/procesar', {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Error al procesar');
                cerrarModal();
                await loadReclamaciones();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        loadReclamaciones();
    </script>
</body>
</html>
