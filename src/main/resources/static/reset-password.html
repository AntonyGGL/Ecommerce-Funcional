<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña | Impofer</title>
    <link rel="icon" type="image/png" href="/Impofer.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            black: '#0f172a',
                            dark: '#1e293b',
                            accent: '#f97316',
                            light: '#94a3b8'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-black text-white antialiased font-sans h-screen overflow-hidden flex">

    <div class="hidden lg:flex lg:w-1/2 relative bg-brand-dark items-end p-16">
        <div class="absolute inset-0 z-0">
            <img src="https://extoltools.com/wp-content/uploads/2024/05/Classification-by-Portability-768x480.jpg" 
                 class="w-full h-full object-cover opacity-80">
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-brand-black via-transparent to-transparent z-10"></div>
    </div>

    <div class="w-full lg:w-1/2 flex flex-col justify-center items-center px-8 relative bg-brand-black">
        
        <a href="login.html" class="absolute top-8 left-8 flex items-center gap-2 text-slate-400 hover:text-white transition text-sm font-semibold">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Cancelar
        </a>

        <div id="reset-section" class="w-full max-w-md space-y-8">
            <div class="text-center">
                <div class="flex justify-center items-center gap-2 mb-2">
                    <i data-lucide="hexagon" class="text-brand-accent h-8 w-8 fill-brand-accent/20"></i>
                    <span class="font-bold text-2xl tracking-tight">IMPOFER<span class="text-brand-accent">.</span></span>
                </div>
                <h2 class="text-2xl font-bold text-white">Nueva Contraseña</h2>
                <p class="text-slate-400 text-sm mt-2">Dinos cual es tu nueva clave de acceso.</p>
            </div>

            <form id="resetPasswordForm" class="space-y-5">
                <input type="hidden" id="token">
                
                <div>
                    <label for="newPassword" class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">Nueva Contraseña</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-slate-500 group-focus-within:text-brand-accent transition-colors"></i>
                        </div>
                        <input type="password" id="newPassword" required minlength="6" class="bg-brand-dark block w-full pl-10 pr-3 py-3 border border-white/10 rounded-lg placeholder-slate-500 text-white focus:outline-none focus:border-brand-accent focus:ring-1 focus:ring-brand-accent transition-all sm:text-sm" placeholder="••••••••">
                    </div>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">Confirmar Contraseña</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-slate-500 group-focus-within:text-brand-accent transition-colors"></i>
                        </div>
                        <input type="password" id="confirmPassword" required minlength="6" class="bg-brand-dark block w-full pl-10 pr-3 py-3 border border-white/10 rounded-lg placeholder-slate-500 text-white focus:outline-none focus:border-brand-accent focus:ring-1 focus:ring-brand-accent transition-all sm:text-sm" placeholder="••••••••">
                    </div>
                </div>

                <div id="error-message" class="hidden text-xs text-red-500 font-semibold px-2">
                </div>

                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-lg shadow-orange-500/20 text-sm font-bold text-white bg-brand-accent hover:bg-orange-600 focus:outline-none transition-all transform hover:scale-[1.02]">
                    Restablecer Contraseña
                </button>
            </form>
        </div>
        
        <div class="absolute bottom-6 text-xs text-slate-600">
            © 2024 Impofer S.A. Privacidad y Términos.
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Obtener token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (!token) {
            alert('Enlace de recuperación inválido');
            window.location.href = 'login.html';
        }
        document.getElementById('token').value = token;

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tokenValue = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('error-message');

            if (newPassword !== confirmPassword) {
                errorDiv.innerText = "Las contraseñas no coinciden";
                errorDiv.classList.remove('hidden');
                return;
            }

            errorDiv.classList.add('hidden');
            
            try {
                const response = await fetch(`/api/auth/reset-password?token=${encodeURIComponent(tokenValue)}&newPassword=${encodeURIComponent(newPassword)}`, {
                    method: 'POST'
                });
                
                const message = await response.text();
                if (response.ok) {
                    alert('Contraseña restablecida con éxito. Puedes iniciar sesión ahora.');
                    window.location.href = 'login.html';
                } else {
                    alert(message || 'Error al restablecer la contraseña');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error al conectar con el servidor');
            }
        });
    </script>
</body>
</html>
