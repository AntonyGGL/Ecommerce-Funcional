<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Impofer</title>
    <link rel="icon" type="image/png" href="/Impofer.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#0f172a',
                            dark: '#1e293b',
                            card: '#1e293b',
                            accent: '#f97316'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-black text-white antialiased font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-brand-dark border-r border-white/5 hidden md:flex flex-col">
        <div class="h-20 flex items-center px-6 border-b border-white/5">
            <div class="flex items-center gap-2">
                <i data-lucide="hexagon" class="text-brand-accent h-6 w-6 fill-brand-accent/20"></i>
                <span class="font-bold text-xl tracking-tight">IMPOFER<span class="text-brand-accent">.</span></span>
            </div>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2">
            <p class="px-2 text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">General</p>
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-brand-accent/10 text-brand-accent rounded-lg font-semibold">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="orders-admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-lg transition">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i> Pedidos
            </a>
            <a href="clients-admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-lg transition">
                <i data-lucide="users" class="w-5 h-5"></i> Clientes
            </a>
            <p class="px-2 text-xs font-bold text-slate-500 uppercase tracking-wider mt-8 mb-2">Inventario</p>
            <a href="inventory-admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-lg transition">
                <i data-lucide="package" class="w-5 h-5"></i> Productos
            </a>
            <p class="px-2 text-xs font-bold text-slate-500 uppercase tracking-wider mt-8 mb-2">Atenci&oacute;n</p>
            <a href="reclamaciones-admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-lg transition">
                <i data-lucide="book-open" class="w-5 h-5"></i> Reclamaciones
            </a>            <a href="cotizaciones-admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-lg transition-colors">
                <i data-lucide="file-text" class="w-5 h-5"></i> Cotizaciones
            </a>        </nav>

        <div class="p-4 border-t border-white/5 space-y-2">
            <a href="index.html" class="flex items-center gap-3 px-4 py-2 text-slate-400 hover:bg-white/5 rounded-lg transition text-sm w-full border border-white/5">
                <i data-lucide="external-link" class="w-4 h-4"></i> Ir a la tienda
            </a>
            <button onclick="logout()" class="flex items-center gap-3 px-4 py-2 text-slate-400 hover:text-red-400 transition text-sm w-full">
                <i data-lucide="log-out" class="w-4 h-4"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 bg-brand-black/90 border-b border-white/5 flex justify-between items-center px-8 z-10">
            <div>
                <h1 class="text-xl font-bold">Dashboard</h1>
                <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Base de Datos: PostgreSQL Online</p>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-brand-black">
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="stats-container">
                <!-- Stats cargadas dinámicamente -->
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-brand-card rounded-xl border border-white/5 p-6">
                    <h2 class="text-lg font-bold mb-6">Estadísticas de Ventas</h2>
                    <div class="h-64 relative">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>

                <div class="bg-brand-card rounded-xl border border-white/5 p-6">
                    <h2 class="font-bold mb-4">Pedidos Recientes</h2>
                    <div id="recent-orders" class="space-y-4">
                        <!-- Pedidos cargados dinámicamente -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function checkAdmin() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            
            if (!token || role !== 'ADMIN') {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        
        let salesChart;

        async function initChart(data) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            
            const labels = Object.keys(data).map(date => {
                const [y, m, d] = date.split('-');
                return `${d}/${m}`;
            });
            const values = Object.values(data);

            if (salesChart) salesChart.destroy();

            salesChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Ventas Diarias (S/)',
                        data: values,
                        borderColor: '#f97316',
                        backgroundColor: 'rgba(249, 115, 22, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#f97316',
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleColor: '#94a3b8',
                            bodyColor: '#fff',
                            bodyFont: { weight: 'bold' },
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return 'S/ ' + context.parsed.y.toLocaleString('es-PE', {minimumFractionDigits: 2});
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { 
                                color: '#64748b',
                                font: { size: 10 },
                                callback: value => 'S/ ' + value
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { 
                                color: '#64748b',
                                font: { size: 10 }
                            }
                        }
                    }
                }
            });
        }
        
        async function loadDashboard() {
            if (!checkAdmin()) return;
            
            const token = localStorage.getItem('token');
            const headers = {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };

            try {
                const statsRes = await fetch('/api/admin/stats', { headers });
                if (statsRes.status === 403) {
                    window.location.href = 'index.html';
                    return;
                }
                const stats = await statsRes.json();
                
                const statsHTML = `
                    <div class="bg-brand-card p-6 rounded-xl border border-white/5">
                        <p class="text-xs text-slate-400 uppercase font-bold">Ventas Totales</p>
                        <h3 class="text-2xl font-bold text-white mt-1">S/ ${parseFloat(stats.totalSales || 0).toFixed(2)}</h3>
                    </div>
                    <div class="bg-brand-card p-6 rounded-xl border border-white/5">
                        <p class="text-xs text-slate-400 uppercase font-bold">Pedidos</p>
                        <h3 class="text-2xl font-bold text-white mt-1">${stats.totalOrders || '0'}</h3>
                    </div>
                    <div class="bg-brand-card p-6 rounded-xl border border-white/5">
                        <p class="text-xs text-slate-400 uppercase font-bold">Clientes</p>
                        <h3 class="text-2xl font-bold text-white mt-1">${stats.totalClients || '0'}</h3>
                    </div>
                    <div class="bg-brand-card p-6 rounded-xl border border-white/5 shadow-lg shadow-orange-500/10 border-orange-500/20">
                        <p class="text-xs text-brand-accent uppercase font-bold">Alertas Stock</p>
                        <h3 class="text-2xl font-bold text-white mt-1">${stats.lowStockCount || '0'}</h3>
                    </div>
                `;
                document.getElementById('stats-container').innerHTML = statsHTML;
                
                // Iniciar Gráfico
                if (stats.chartData) {
                    initChart(stats.chartData);
                }

                const ordersHTML = (stats.recentOrders || []).map(order => `
                    <div class="p-3 bg-brand-black rounded-lg border border-white/5 hover:border-brand-accent/30 transition-colors cursor-pointer group">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-sm font-bold text-white">#ORD-${order.id}</p>
                                <p class="text-[10px] text-slate-500 uppercase font-bold">${order.user?.firstName || 'Cliente'}</p>
                            </div>
                            <p class="text-sm font-bold text-brand-accent">S/ ${parseFloat(order.total).toFixed(2)}</p>
                        </div>
                    </div>
                `).join('');
                document.getElementById('recent-orders').innerHTML = ordersHTML || '<p class="text-xs text-slate-500 text-center py-4">Sin pedidos recientes</p>';

                // Actualizar iconos
                lucide.createIcons();
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
