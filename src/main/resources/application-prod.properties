# ============================================================
# PERFIL DE PRODUCCION — activa con: --spring.profiles.active=prod
# Todas las variables de entorno son OBLIGATORIAS en prod.
# ============================================================

# Servidor
server.port=${PORT:8080}

# Base de datos — sobreescribe el localhost de development
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JWT — usa la clave del entorno de produccion
app.jwt.secret=${JWT_SECRET}

# CORS — dominio(s) de produccion
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://ferreteriaimpofer.com,https://www.ferreteriaimpofer.com}

# URL base para links en emails (recuperacion de contrasena)
app.reset-password.url=${APP_BASE_URL}/reset-password.html
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/css,text/javascript,application/javascript
server.compression.min-response-size=1024
server.http2.enabled=true
spring.web.error.include-message=never
spring.web.error.include-stacktrace=never
spring.web.error.include-exception=false
spring.web.error.include-binding-errors=never

# HTTPS — configura tu keystore o usa reverse proxy (nginx/caddy)
# server.ssl.key-store=${SSL_KEYSTORE_PATH}
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=impofer

# JPA — validate verifica que las tablas existan (Flyway las gestiona en migraciones)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway — baseline en V9 para no re-ejecutar migraciones ya aplicadas manualmente
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=9

# Flyway — aplicar migraciones en prod
spring.flyway.enabled=true
spring.flyway.clean-disabled=true
spring.flyway.out-of-order=false

# Pool de conexiones ajustado para prod
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.leak-detection-threshold=60000

# JWT — token mas corto en prod (4 horas)
app.jwt.expiration=${JWT_EXPIRATION:14400000}

# Logging — minimo en prod, solo WARN/ERROR
logging.level.root=WARN
logging.level.com.example.demo=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=ERROR
logging.level.org.flywaydb=INFO

# Logging estructurado (JSON) para log aggregators (DataDog, ELK, etc.)
logging.structured.format.console=ecs

# Actuator — en prod solo health, protegido por IP o autenticacion
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.server.port=${MANAGEMENT_PORT:8081}
