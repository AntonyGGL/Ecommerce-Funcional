spring.application.name=impofer
server.port=0

# ============================================================
# Configuracion para tests — H2 en memoria
# ============================================================

# H2 in-memory datasource (reemplaza PostgreSQL en tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA — Hibernate crea y destruye el schema en cada test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway deshabilitado — el schema lo gestiona Hibernate en tests
spring.flyway.enabled=false

# Desactivar ejecucion de schema.sql/data.sql en tests
# (Hibernate crea el schema con ddl-auto=create-drop)
spring.sql.init.mode=never

# JWT — clave de prueba (minimo 32 caracteres para HMAC-SHA256)
app.jwt.secret=clave-secreta-de-prueba-suficientemente-larga-para-hmac-sha256-tests
app.jwt.expiration=86400000

# Email — valores ficticios (no se envian emails en tests)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@example.com
spring.mail.password=testpassword
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.trust=localhost

# CORS
app.cors.allowed-origins=http://localhost:8080,http://localhost:3000

# URL de reset password
app.reset-password.url=http://localhost:8080/reset-password.html

# Logging reducido en tests
logging.level.root=WARN
logging.level.com.example.demo=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
