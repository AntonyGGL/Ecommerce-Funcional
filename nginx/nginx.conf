worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types         text/plain text/css text/xml application/json
                       application/javascript application/xml+rss
                       application/atom+xml image/svg+xml;

    # Seguridad — ocultar version de Nginx
    server_tokens off;

    # ─────────────────────────────────────────────────────────────
    # HTTP — redirige todo a HTTPS + challenge de Let's Encrypt
    # ─────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name ferreteriaimpofer.com www.ferreteriaimpofer.com;

        # Ruta para la verificación de Certbot (renovacion automatica)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirigir todo lo demas a HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────
    # HTTPS — reverse proxy con SSL (Let's Encrypt)
    # ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name ferreteriaimpofer.com www.ferreteriaimpofer.com;

        # Certificados generados por Certbot
        ssl_certificate     /etc/letsencrypt/live/ferreteriaimpofer.com-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ferreteriaimpofer.com-0001/privkey.pem;

        # Parametros SSL modernos
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;

        # Cabeceras de seguridad
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"       always;
        add_header X-Frame-Options           "SAMEORIGIN"    always;
        add_header X-XSS-Protection          "1; mode=block" always;

        client_max_body_size 20M;

        # Proxy hacia la aplicacion Spring Boot
        location / {
            proxy_pass         http://app:8080;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_connect_timeout  60s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }

        # Endpoint de salud — no logear (reduce ruido)
        location = /actuator/health {
            proxy_pass http://app:8081/actuator/health;
            access_log off;
        }
    }
}
